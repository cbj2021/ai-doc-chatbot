<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Document Chatbot</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap");
  :root{--bg:#07080f;--surface:#0f1018;--surface2:#16162a;--border:#1e2038;--accent:#a78bfa;--green:#34d399;--text:#e2e8f0;--muted:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:"Syne",sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  .header{background:linear-gradient(135deg,#07080f,#0f1018);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;gap:12px;}
  .header h1{font-size:22px;font-weight:800;}
  .header h1 span{color:var(--accent);}
  .badge{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--accent);}
  .main{display:grid;grid-template-columns:320px 1fr;flex:1;height:calc(100vh - 65px);}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
  .sidebar h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;}
  .upload-zone:hover{border-color:var(--accent);background:rgba(167,139,250,0.05);}
  .upload-zone p{font-size:13px;color:var(--muted);margin-top:8px;}
  .upload-zone .icon{font-size:28px;}
  #file-input{display:none;}
  .btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Syne",sans-serif;width:100%;transition:opacity .2s;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text);}
  .doc-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between;}
  .doc-id{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--accent);}
  .doc-name{font-size:11px;color:var(--muted);margin-top:2px;}
  .use-btn{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);color:var(--accent);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:"Syne",sans-serif;}
  .chat-area{display:flex;flex-direction:column;overflow:hidden;}
  .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .active-doc{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--accent);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);border-radius:6px;padding:4px 10px;}
  .messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
  .message{max-width:80%;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.7;}
  .message.user{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.2);align-self:flex-end;}
  .message.assistant{background:var(--surface);border:1px solid var(--border);align-self:flex-start;}
  .message.assistant .chunks{font-size:10px;color:var(--muted);margin-top:8px;font-family:"JetBrains Mono",monospace;}
  .message.system{background:transparent;border:1px dashed var(--border);align-self:center;color:var(--muted);font-size:12px;text-align:center;}
  .thinking{display:flex;gap:4px;align-items:center;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;align-self:flex-start;}
  .thinking span{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:bounce .8s infinite;}
  .thinking span:nth-child(2){animation-delay:.15s;}
  .thinking span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
  .input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;}
  .input-area input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:"Syne",sans-serif;font-size:13px;outline:none;}
  .input-area input:focus{border-color:var(--accent);}
  .input-area input::placeholder{color:var(--muted);}
  .send-btn{background:var(--accent);border:none;border-radius:8px;padding:12px 20px;color:white;font-size:16px;cursor:pointer;transition:opacity .2s;}
  .send-btn:hover{opacity:.85;}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;}
  .progress{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-top:8px;}
  .progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;}
  .status{font-size:11px;color:var(--muted);margin-top:6px;}
  @media(max-width:768px){.main{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>

<div class="header">
  <div class="badge">🤖 Local AI</div>
  <h1>AI Document <span>Chatbot</span></h1>
  <span style="font-size:12px;color:var(--muted);margin-left:auto">Powered by Llama 3 · No cloud required</span>
</div>

<div class="main">
  <div class="sidebar">
    <h2>Upload Document</h2>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📄</div>
      <p id="upload-label">Click to select a PDF</p>
    </div>
    <input type="file" id="file-input" accept=".pdf">
    <div class="progress" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <p class="status" id="upload-status"></p>
    <button class="btn" id="upload-btn" disabled onclick="uploadFile()">Upload & Process</button>

    <h2 style="margin-top:8px">Your Documents</h2>
    <div id="doc-list" style="display:flex;flex-direction:column;gap:8px">
      <p style="font-size:12px;color:var(--muted)">No documents yet</p>
    </div>
    <button class="btn btn-secondary" onclick="loadDocuments()" style="margin-top:4px">↻ Refresh</button>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <span style="font-size:13px;font-weight:700">Chat</span>
      <span class="active-doc" id="active-doc-label">No document selected</span>
    </div>
    <div class="messages" id="messages">
      <div class="message system">Upload a PDF and select it to start asking questions</div>
    </div>
    <div class="input-area">
      <input type="text" id="question-input" placeholder="Ask a question about your document..." onkeydown="if(event.key==='Enter')sendQuestion()">
      <button class="send-btn" id="send-btn" onclick="sendQuestion()">➤</button>
    </div>
  </div>
</div>

<script>
  let activeDocId = null;
  let selectedFile = null;

  document.getElementById("file-input").addEventListener("change", e => {
    selectedFile = e.target.files[0];
    if(selectedFile){
      document.getElementById("upload-label").textContent = selectedFile.name;
      document.getElementById("upload-btn").disabled = false;
    }
  });

  async function uploadFile(){
    if(!selectedFile) return;
    const btn = document.getElementById("upload-btn");
    const status = document.getElementById("upload-status");
    const progressWrap = document.getElementById("progress-wrap");
    const progressBar = document.getElementById("progress-bar");
    btn.disabled = true;
    progressWrap.style.display = "block";
    progressBar.style.width = "30%";
    status.textContent = "Uploading...";
    const formData = new FormData();
    formData.append("file", selectedFile);
    try {
      progressBar.style.width = "60%";
      status.textContent = "Processing and embedding chunks...";
      const res = await fetch("/api/upload", {method:"POST", body:formData});
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail || "Upload failed");
      progressBar.style.width = "100%";
      status.textContent = `✓ ${data.chunks_created} chunks created. Doc ID: ${data.doc_id}`;
      setActiveDoc(data.doc_id, selectedFile.name);
      loadDocuments();
      addMessage("system", `Document "${selectedFile.name}" processed successfully. You can now ask questions!`);
    } catch(e){
      status.textContent = `✗ Error: ${e.message}`;
      progressBar.style.width = "0%";
    }
    btn.disabled = false;
  }

  async function loadDocuments(){
    const res = await fetch("/api/documents");
    const data = await res.json();
    const list = document.getElementById("doc-list");
    if(!data.documents.length){
      list.innerHTML = "<p style='font-size:12px;color:var(--muted)'>No documents yet</p>";
      return;
    }
    list.innerHTML = data.documents.map(id => `
      <div class="doc-card">
        <div>
          <div class="doc-id">${id}</div>
          <div class="doc-name">Click to select</div>
        </div>
        <button class="use-btn" onclick="setActiveDoc('${id}', '${id}')">Use</button>
      </div>
    `).join("");
  }

  function setActiveDoc(docId, name){
    activeDocId = docId;
    document.getElementById("active-doc-label").textContent = `📄 ${name} (${docId})`;
  }

  async function sendQuestion(){
    const input = document.getElementById("question-input");
    const question = input.value.trim();
    if(!question) return;
    if(!activeDocId){ addMessage("system", "Please select a document first."); return; }
    input.value = "";
    addMessage("user", question);
    const thinking = addThinking();
    document.getElementById("send-btn").disabled = true;
    try {
      const res = await fetch("/api/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({doc_id: activeDocId, question})
      });
      const data = await res.json();
      thinking.remove();
      if(!res.ok) throw new Error(data.detail || "Failed");
      addMessage("assistant", data.answer, data.chunks_used);
    } catch(e){
      thinking.remove();
      addMessage("system", `Error: ${e.message}`);
    }
    document.getElementById("send-btn").disabled = false;
  }

  function addMessage(role, text, chunks){
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = text.replace(/\n/g, "<br>");
    if(chunks) div.innerHTML += `<div class="chunks">📚 Used ${chunks} chunk${chunks>1?"s":""} from document</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addThinking(){
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "thinking";
    div.innerHTML = "<span></span><span></span><span></span>";
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  loadDocuments();
</script>
</body>
</html>
